services:
  registry:
    image: registry:3
    ports:
      - "5050:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '["http://localhost:3000"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '["HEAD", "GET", "OPTIONS", "DELETE"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '["Authorization", "Accept", "Content-Type"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '["Link", "Docker-Content-Digest", "Content-Type"]'
    volumes:
      - registry-data:/var/lib/registry
    restart: unless-stopped

  registry-webui:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - registry
    restart: unless-stopped

volumes:
  registry-data:
